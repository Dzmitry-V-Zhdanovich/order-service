spring:
  profiles:
    active: local
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://${DB_LOCAL_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:order_service_db}
    username: ${DB_USER:javauser}
    password: ${DB_PASSWORD:12345678}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 30000
      pool-name: OrderServiceHikariPool

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    enabled: true
    drop-first: false

server:
  port: 8083

logging:
  level:
    liquibase: INFO
    com.zaxxer.hikari: DEBUG
    com.innowise.orderservice: DEBUG