spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:order_service_db}
    username: ${DB_USERNAME:javauser}
    password: ${DB_PASSWORD:12345678}
    driver-class-name: org.postgresql.Driver

user:
  service:
    url: ${USER_SERVICE_URL:http://user-service:8081}

server:
  port: 8083

logging:
  level:
    com.example.orderservice: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: INFO