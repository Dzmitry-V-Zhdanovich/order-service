databaseChangeLog:
  - changeSet:
      id: 1
      author: Dmitry
      labels: create-table
      comment: "Create orders table"
      changes:
        - createTable:
            tableName: orders
            remarks: "Table with orders"
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
                  remarks: "Primary key"
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
                  remarks: "Reference to UserService user ID"
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                  remarks: "Order status"
              - column:
                  name: total_price
                  type: DECIMAL(10,2)
                  constraints:
                    nullable: false
                  remarks: "Order total price"
              - column:
                  name: deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
                  remarks: "Is order deleted"
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: "CURRENT_TIMESTAMP"
                  constraints:
                    nullable: false
                  remarks: "Creation timestamp"
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: "CURRENT_TIMESTAMP"
                  constraints:
                    nullable: false
                  remarks: "Last update timestamp"

      rollback:
        - dropTable:
            tableName: orders